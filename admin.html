<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>usherinmaking 관리자</title>
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<!-- ════════════════ ログイン ════════════════ -->
<section id="login-view" class="login-view" hidden>
  <form id="login-form" class="login-card" autocomplete="off">
    <div class="login-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-6 9 6v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 21V12h6v9"/>
      </svg>
    </div>
    <h1 class="login-brand">usher in making</h1>
    <p class="login-sub">관리 콘솔</p>
    <label class="field">
      <span>비밀번호</span>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
    </label>
    <button type="submit" class="btn btn-primary btn-block" id="login-btn">로그인</button>
    <p class="form-msg" id="login-msg" role="alert"></p>
  </form>
</section>

<!-- ════════════════ アプリシェル ════════════════ -->
<div id="app" class="app" hidden>

  <!-- 左サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-6 9 6v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 21V12h6v9"/>
        </svg>
      </span>
      <span class="sidebar-name">usher in making<small>관리 콘솔</small></span>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <a class="nav-link" href="#/dashboard" data-route="dashboard">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span>대시보드</span>
      </a>
      <a class="nav-link" href="#/reservations" data-route="reservations">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
        <span>예약 관리</span>
        <em class="nav-badge" id="nav-badge-reservations" hidden></em>
      </a>
      <a class="nav-link" href="#/contacts" data-route="contacts">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M3 6l9 7 9-7"/></svg>
        <span>문의</span>
        <em class="nav-badge" id="nav-badge-contacts" hidden></em>
      </a>
      <a class="nav-link" href="#/content" data-route="content">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        <span>콘텐츠 관리</span>
      </a>
      <a class="nav-link" href="#/pages" data-route="pages">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/></svg>
        <span>페이지 관리</span>
      </a>
      <a class="nav-link" href="#/seo" data-route="seo">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>SEO / AEO</span>
      </a>
      <a class="nav-link" href="#/settings" data-route="settings">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>설정</span>
      </a>
    </nav>

    <div class="sidebar-foot">
      <span class="dot dot-ok"></span> 시스템 정상 작동 중
    </div>
  </aside>
  <div class="scrim" id="sidebar-scrim" hidden></div>

  <!-- メイン領域 -->
  <div class="main-wrap">
    <header class="topbar">
      <button class="icon-btn hamburger" id="menu-toggle" aria-label="메뉴">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="page-title" id="page-title">대시보드</h1>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm publish-top" id="publish-top" title="편집 내용을 운영 사이트에 반영합니다(재구축)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
          <span class="publish-top-label">발행(사이트 재구축)</span>
        </button>
        <button class="icon-btn" id="refresh-btn" aria-label="새로고침" title="새로고침">
          <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
        </button>
        <div class="user-chip">
          <span class="user-avatar" aria-hidden="true">A</span>
          <span class="user-name">관리자</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="logout-btn">로그아웃</button>
      </div>
    </header>

    <main class="view-root" id="view-root">
      <!-- 各ビューは JS が描画。雛形コンテナのみ用意 -->
      <section class="view" data-view="dashboard" hidden></section>
      <section class="view" data-view="reservations" hidden></section>
      <section class="view" data-view="contacts" hidden></section>
      <section class="view" data-view="content" hidden></section>
      <section class="view" data-view="pages" hidden></section>
      <section class="view" data-view="seo" hidden></section>
      <section class="view" data-view="settings" hidden></section>
    </main>
  </div>
</div>

<!-- ════════════════ 詳細ドロワー ════════════════ -->
<div class="drawer-scrim" id="drawer-scrim" hidden></div>
<aside class="drawer" id="drawer" hidden aria-label="상세">
  <header class="drawer-head">
    <h2 id="drawer-title">상세</h2>
    <button class="icon-btn" id="drawer-close" aria-label="닫기">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </header>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<!-- ════════════════ 画像ピッカー（ギャラリー）════════════════ -->
<div class="picker-scrim" id="picker-scrim" hidden></div>
<aside class="picker" id="picker" hidden aria-label="이미지 선택">
  <header class="picker-head">
    <h2>이미지 선택</h2>
    <label class="picker-search field">
      <input type="search" id="picker-search" placeholder="파일명으로 검색" autocomplete="off" />
    </label>
    <button class="icon-btn" id="picker-close" aria-label="닫기">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </header>
  <div class="picker-grid" id="picker-grid"></div>
  <footer class="picker-foot">
    <span class="sub" id="picker-count">0개 선택됨</span>
    <button class="btn btn-primary" id="picker-add" disabled>선택한 이미지 추가</button>
  </footer>
</aside>

<!-- ════════════════ トースト ════════════════ -->
<div class="toast-stack" id="toasts" aria-live="polite"></div>

<script src="js/admin.js" defer></script>
</body>
</html>
